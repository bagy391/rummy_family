<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Premium rounded square with a subtle gradient and gold border -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base App Background -->
  <rect width="480" height="480" x="16" y="16" rx="96" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="12" />
  
  <!-- Outer Glow circle behind cards -->
  <circle cx="256" cy="256" r="180" fill="#116b3e" opacity="0.15" />
  
  <!-- Cards Group -->
  <g filter="url(#shadow)">
    <!-- Back Card: Ace of Spades (Tilted Left) -->
    <g transform="translate(210, 240) rotate(-15) translate(-100, -150)">
      <!-- Card Body -->
      <rect width="180" height="260" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="4" />
      <!-- Rank (A) -->
      <text x="20" y="45" font-family="'Outfit', sans-serif" font-size="32" font-weight="900" fill="#0f172a">A</text>
      <!-- Small Suit -->
      <path d="M 20 80 C 20 70, 35 70, 35 80 C 35 90, 20 95, 20 100 C 20 95, 5 90, 5 80 C 5 70, 20 70, 20 80 Z" fill="#3b82f6" transform="translate(5, -15) scale(0.6)" />
      <!-- Center Spade -->
      <g transform="translate(90, 130) scale(2.8)">
        <!-- Spade shape -->
        <path d="M 0 -15 C 3 -15, 12 -5, 12 3 C 12 9, 7 12, 0 12 C -7 12, -12 9, -12 3 C -12 -5, -3 -15, 0 -15 Z" fill="#0f172a" />
        <!-- Spade Stem -->
        <path d="M 0 5 Q -4 16, -8 18 L 8 18 Q 4 16, 0 5" fill="#0f172a" />
      </g>
    </g>

    <!-- Front Card: King of Hearts (Tilted Right) -->
    <g transform="translate(300, 260) rotate(10) translate(-100, -150)">
      <!-- Card Body -->
      <rect width="180" height="260" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="4" />
      <!-- Rank (K) -->
      <text x="20" y="45" font-family="'Outfit', sans-serif" font-size="32" font-weight="900" fill="#ef4444">K</text>
      <!-- Small Suit -->
      <path d="M 12 5 C 12 0, 0 0, 0 8 C 0 16, 12 24, 12 24 C 12 24, 24 16, 24 8 C 24 0, 12 0, 12 5 Z" fill="#ef4444" transform="translate(10, 55) scale(0.6)" />
      <!-- Center Heart -->
      <g transform="translate(90, 130) scale(2.8)">
        <!-- Heart Shape -->
        <path d="M 0 -8 C 0 -13, -10 -13, -10 -5 C -10 3, 0 11, 0 11 C 0 11, 10 3, 10 -5 C 10 -13, 0 -13, 0 -8 Z" fill="#ef4444" />
      </g>
    </g>
  </g>
</svg>